<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Documentation Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<style>
 :root{font-family:system-ui,sans-serif}
 body{margin:0;background:#0d1117;color:#e6edf3}
 header{padding:1.2rem;text-align:center}h1{margin:0;font-size:1.5rem}.sub{color:#8b97a7;font-size:.85rem}
 .wrap{max-width:1100px;margin:0 auto;padding:0 1rem 3rem}
 .grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
 textarea{width:100%;box-sizing:border-box;height:380px;background:#0b0f16;color:#e6edf3;border:1px solid #30363d;border-radius:10px;padding:.8rem;font-family:ui-monospace,monospace;font-size:.85rem}
 .controls{display:flex;gap:.5rem;align-items:center;margin:.6rem 0}
 select,input{padding:.5rem;border-radius:8px;border:1px solid #30363d;background:#0b0f16;color:#fff}
 button{padding:.55rem 1.2rem;border:0;border-radius:8px;background:#1f6feb;color:#fff;font-weight:600;cursor:pointer}
 .out{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:1rem;height:380px;overflow:auto}
 .out pre{background:#0b0f16;padding:.7rem;border-radius:8px;overflow:auto}
 .out code{font-family:ui-monospace,monospace}
 @media(max-width:820px){.grid{grid-template-columns:1fr}}
</style></head><body>
<header><h1>📝 Documentation Generator</h1><div class="sub">Paste code → AI docs · Cloudflare Workers AI</div></header>
<div class="wrap">
 <div class="controls">
  <label>Style
   <select id="style"><option value="reference">API reference</option><option value="readme">README overview</option><option value="inline">Inline comments</option><option value="tutorial">Tutorial</option></select>
  </label>
  <input id="lang" placeholder="language (optional)" style="width:160px"/>
  <button id="gen">Generate</button>
  <span id="msg" class="sub"></span>
 </div>
 <div class="grid">
  <textarea id="code" placeholder="Paste your source code here…"></textarea>
  <div class="out" id="out"><span class="sub">Documentation will appear here.</span></div>
 </div>
 <button id="copy" style="margin-top:.6rem;background:#30363d">Copy markdown</button>
</div>
<script>
const $=id=>document.getElementById(id);let lastMd="";
$("gen").onclick=async()=>{
 const code=$("code").value;if(!code.trim()){$("msg").textContent="Paste some code first";return;}
 $("msg").textContent="Generating…";$("out").innerHTML="<span class=sub>Working…</span>";
 const r=await fetch("/api/generate",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({code,language:$("lang").value||undefined,style:$("style").value})});
 const d=await r.json();
 if(d.error){$("msg").textContent=d.error;return;}
 lastMd=d.documentation;$("out").innerHTML=marked.parse(lastMd);$("msg").textContent="Done ("+d.style+")";
};
$("copy").onclick=()=>{if(lastMd)navigator.clipboard.writeText(lastMd).then(()=>$("msg").textContent="Copied!");};
</script>
</body></html>
